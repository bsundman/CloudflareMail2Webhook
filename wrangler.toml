name = "mail-webhook"
main = "worker.js"
compatibility_date = "2026-04-04"
keep_vars = true

[observability]
enabled = true
head_sampling_rate = 1

[observability.logs]
enabled = true
head_sampling_rate = 1
invocation_logs = true

[observability.traces]
enabled = false
head_sampling_rate = 1

[vars]
WEBHOOK_URL = "REPLACE_IN_DASHBOARD"
WEBHOOK_SECRET = "REPLACE_IN_DASHBOARD"
WEBHOOK_TIMEOUT_MS = "10000"
WEBHOOK_RETRY_DELAY_SECONDS = "840"
EMAIL_ENCRYPTION_KEY_ID = "v1"
# You can put non-sensitive vars here, 
# but keep secrets in the Cloudflare Dashboard!
# Optional secrets for a webhook protected by Cloudflare Access:
# CF_ACCESS_CLIENT_ID
# CF_ACCESS_CLIENT_SECRET
# Required secret for payload encryption:
# EMAIL_ENCRYPTION_KEY

[[r2_buckets]]
binding = "MAIL_R2"
bucket_name = "email"

[[queues.producers]]
binding = "MAIL_RETRY_QUEUE"
queue = "email"

[[queues.consumers]]
queue = "email"
max_batch_size = 1
max_batch_timeout = 1
max_retries = 100
dead_letter_queue = "dlq"
retry_delay = 840
