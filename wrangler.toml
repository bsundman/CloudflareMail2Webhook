name = "mail-webhook"
main = "worker.js"
compatibility_date = "2026-04-04"

[observability]
enabled = true
head_sampling_rate = 1

[observability.logs]
enabled = true
head_sampling_rate = 1
persist = true
invocation_logs = true

[observability.traces]
enabled = false
persist = true
head_sampling_rate = 1

[vars]
WEBHOOK_URL = "REPLACE_IN_DASHBOARD"
WEBHOOK_SECRET = "REPLACE_IN_DASHBOARD"
WEBHOOK_TIMEOUT_MS = "10000"
WEBHOOK_RETRY_DELAY_SECONDS = "840"
# You can put non-sensitive vars here, 
# but keep secrets in the Cloudflare Dashboard!
# Optional secrets for a webhook protected by Cloudflare Access:
# CF_ACCESS_CLIENT_ID
# CF_ACCESS_CLIENT_SECRET
# Bind the following in the Cloudflare dashboard:
# - R2 bucket binding named MAIL_R2
# - Queue producer binding named MAIL_RETRY_QUEUE
#
# Queue consumer settings are still best managed via Wrangler/CLI/API because
# Cloudflare documents consumer worker configuration there:
#
# [[queues.consumers]]
# queue = "YOUR_RETRY_QUEUE_NAME"
# max_batch_size = 1
# max_batch_timeout = 1
# max_retries = 100
# dead_letter_queue = "YOUR_RETRY_DLQ_NAME"
# retry_delay = 840
