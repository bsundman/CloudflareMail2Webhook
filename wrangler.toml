name = "mail-webhook"
main = "worker.js"
compatibility_date = "2026-04-04"
keep_vars = true

[observability]
enabled = true
head_sampling_rate = 1

[observability.logs]
enabled = true
head_sampling_rate = 1
invocation_logs = true

[observability.traces]
enabled = false
head_sampling_rate = 1

# Runtime configuration is intentionally managed in the Cloudflare dashboard.
# `keep_vars = true` preserves existing dashboard vars/secrets on deploy.
#
# Required dashboard variables:
# - WEBHOOK_URL
# Optional dashboard variables:
# - WEBHOOK_TIMEOUT_MS (default in code: 10000)
# - WEBHOOK_RETRY_DELAY_SECONDS (default in code: 840)
# - EMAIL_ENCRYPTION_KEY_ID (default in code: v1)
# - CF_ACCESS_CLIENT_ID
# Optional dashboard secrets:
# - CF_ACCESS_CLIENT_SECRET

[secrets]
required = ["WEBHOOK_SECRET", "EMAIL_ENCRYPTION_KEY"]

[[r2_buckets]]
binding = "MAIL_R2"
bucket_name = "email"

[[queues.producers]]
binding = "MAIL_RETRY_QUEUE"
queue = "email"

[[queues.consumers]]
queue = "email"
max_batch_size = 1
max_batch_timeout = 1
max_retries = 100
dead_letter_queue = "dlq"
retry_delay = 840
